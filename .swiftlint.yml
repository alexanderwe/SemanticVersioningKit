excluded:
  - ".swiftpm/"
  - ".build/"
only_rules:
  - custom_rules
  - discouraged_optional_boolean
  - empty_count
  - empty_string
  - explicit_init
  - force_cast
  - force_try
  - force_unwrapping
  - identifier_name
  - implicitly_unwrapped_optional
  - operator_usage_whitespace

empty_count:
  severity: error
empty_string:
  severity: error
explicit_init:
  include_bare_init: true
  severity: error
force_cast:
  severity: warning # implicitly
force_try:
  severity: warning # explicitly
force_unwrapping:
  severity: error
identifier_name:
  excluded:
    - at
    - d
    - id
    - Id
    - z
    - x
    - y
    - on
    - vc
    - eq
    - gt
    - lt
    - or
    - op
    - fn
    - ns
  allowed_symbols:
    - _
implicitly_unwrapped_optional:
  severity: error
operator_usage_whitespace:
  severity: error

# Allows for 0 lintable files, e.g. all files to lint match exclusion rules
allow_zero_lintable_files: true
